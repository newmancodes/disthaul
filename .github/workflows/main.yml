name: CI/CD

on:
    pull_request:
        branches: [main]
    push:
        branches: [main]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

env:
    CARGO_TERM_COLOR: always

jobs:
    build-and-test-ui:
        name: "Build and Test: UI"
        runs-on: ubuntu-latest

        permissions:
            contents: read

        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
              with:
                  toolchain: stable
                  components: rustfmt, clippy
                  targets: wasm32-unknown-unknown

            - name: Install cargo-binstall
              uses: cargo-bins/cargo-binstall@0b24824336e2b3800b0f89d9e08b2c08bfa3dcdd # v1.17.9

            - name: Install tools
              run: cargo binstall -y trunk wasm-bindgen-cli cargo-llvm-cov cargo-audit
              shell: bash

            - name: Install llvm-tools-preview
              run: rustup component add llvm-tools-preview
              shell: bash

            - name: Cache Rust compilation
              uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
              with:
                  workspaces: ui -> target
                  cache-on-failure: true

            - name: Quality - Code Formatting
              run: cargo fmt --check
              shell: bash
              working-directory: ui

            - name: Quality - Clippy Lints
              run: cargo clippy --target wasm32-unknown-unknown -- -D warnings
              shell: bash
              working-directory: ui

            - name: Quality - Unit Tests with Coverage
              run: |
                  cargo llvm-cov --html
                  cargo llvm-cov --lcov --output-path lcov.info --no-run
              shell: bash
              working-directory: ui

            - name: Security - Dependency Audit
              run: cargo audit
              shell: bash
              working-directory: ui

            - name: Upload Coverage Report
              if: always()
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # 7.0.1
              with:
                  name: ui-coverage
                  path: |
                      ui/target/llvm-cov/html/
                      ui/lcov.info
                  retention-days: 30

            - name: Build Application
              run: trunk build --release
              shell: bash
              working-directory: ui

    build-and-test-client-management:
        name: "Build and Test: Client Management"
        runs-on: ubuntu-latest

        permissions:
            contents: read

        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
              with:
                  toolchain: stable
                  components: rustfmt, clippy

            - name: Install cargo-binstall
              uses: cargo-bins/cargo-binstall@0b24824336e2b3800b0f89d9e08b2c08bfa3dcdd # v1.17.9

            - name: Install tools
              run: cargo binstall -y cargo-llvm-cov cargo-audit
              shell: bash

            - name: Install llvm-tools-preview
              run: rustup component add llvm-tools-preview
              shell: bash

            - name: Cache Rust compilation
              uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
              with:
                  workspaces: client-management -> target
                  cache-on-failure: true

            - name: Quality - Code Formatting
              run: cargo fmt --check
              shell: bash
              working-directory: client-management

            - name: Quality - Clippy Lints
              run: cargo clippy --workspace -- -D warnings
              shell: bash
              working-directory: client-management

            - name: Quality - Unit Tests with Coverage
              run: |
                  cargo llvm-cov --workspace --html
                  cargo llvm-cov --workspace --lcov --output-path lcov.info --no-run
              shell: bash
              working-directory: client-management

            - name: Security - Dependency Audit
              run: cargo audit
              shell: bash
              working-directory: client-management

            - name: Upload Coverage Report
              if: always()
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # 7.0.1
              with:
                  name: client-management-coverage
                  path: |
                      client-management/target/llvm-cov/html/
                      client-management/lcov.info
                  retention-days: 30

    test-end-to-end:
        name: "Test End-to-End Integration"
        runs-on: ubuntu-latest
        needs: [build-and-test-ui, build-and-test-client-management]

        permissions:
            contents: read

        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
            
            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
              with:
                  toolchain: stable
                  targets: wasm32-unknown-unknown

            - name: Install cargo-binstall
              uses: cargo-bins/cargo-binstall@0b24824336e2b3800b0f89d9e08b2c08bfa3dcdd # v1.17.9

            - name: Install tools
              run: cargo binstall -y trunk wasm-bindgen-cli 
              shell: bash

            - name: Cache Rust compilation
              uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
              with:
                  workspaces: |
                    client-management -> target
                    ui -> target
                  cache-on-failure: true

            - name: Setup .NET
              uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7
              with:
                dotnet-version: 10.x
            
            - name: Restore Aspire AppHost Dependencies
              run: dotnet restore DistHaul.sln
              shell: bash
              working-directory: DistHaul

            - name: Build Aspire AppHost
              run: dotnet build DistHaul.sln --configuration Release --no-restore
              shell: bash
              working-directory: DistHaul

            - name: Execute Aspire AppHost Tests
              id: test
              run: dotnet test --solution DistHaul.sln --configuration Release --no-build --verbosity normal --results-directory ./TestResults --coverage --coverage-output-format cobertura
              shell: bash
              working-directory: DistHaul

            - name: Code Coverage Report
              run: |
                dotnet tool install --global dotnet-reportgenerator-globaltool --version 5.5.4
                reportgenerator -reports:TestResults/**.cobertura.xml -targetdir:coveragereport -reporttypes:Html "-filefilters:-*.g.cs" -verbosity:Warning
                cd coveragereport
                zip -r ../code-coverage-report.zip .
              shell: bash
              working-directory: DistHaul

            - name: Archive Test Report
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # 7.0.1
              if: ${{ steps.test.conclusion == 'success' && always()}}
              with:
                name: aspire-code-coverage-report
                path: ./DistHaul/coveragereport/
                retention-days: 7